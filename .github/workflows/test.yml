name: Build and Test

on:
  merge_group:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_VERSION: 22
  CACHE_KEY: '${{ github.ref }}-${{ github.run_id }}-${{ github.run_attempt }}'
  IMPORT_STATEMENT: |
    import './auth0';
  AUTH0_CONTENT: |
    import { Auth0Client } from '@auth0/auth0-spa-js';
    new Auth0Client({
      domain: 'DOMAIN',
      clientId: 'CLIENT_ID'
    });

jobs:
  test:
    name: Build Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Build package
        uses: ./.github/actions/build
        with:
          node: ${{ env.NODE_VERSION }}

      - name: Save build artifacts
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .
          key: ${{ env.CACHE_KEY }}

  unit:
    needs: test

    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Restore build artifacts
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .
          key: ${{ env.CACHE_KEY }}

      - name: Run tests
        run: npm run test -- --maxWorkers=2

      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # pin@7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  verify-types:
    needs: test

    name: Verify Type Declarations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Restore build artifacts
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .
          key: ${{ env.CACHE_KEY }}

      - name: Verify type declarations
        run: |
          count=$(npm pack --dry-run 2>&1 | grep -c "dist/typings/" || true)
          echo "Found $count typings files in package"
          test "$count" -gt 0 || { echo "typings not included in package!"; exit 1; }

  gatsby:
    needs: test

    name: Gatsby Tests
    runs-on: ubuntu-latest

    env:
      IMPORT_STATEMENT: |
        import './../auth0';

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Run framework tests
        uses: ./.github/actions/framework
        with:
          node: ${{ env.NODE_VERSION }}
          cache: ${{ env.CACHE_KEY }}
          ignore-scripts: false
          install: |
            npx gatsby new my-app < /dev/null
          content: |
            echo -e "${{ env.AUTH0_CONTENT }}" > src/auth0.js;
          import: |
            echo -e "${{ env.IMPORT_STATEMENT }}"|cat - src/pages/index.js > /tmp/out && mv /tmp/out src/pages/index.js;

  react:
    needs: test

    name: React Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Run framework tests
        uses: ./.github/actions/framework
        with:
          node: ${{ env.NODE_VERSION }}
          cache: ${{ env.CACHE_KEY }}
          install: |
            npx create-react-app my-app < /dev/null
          content: |
            echo -e "${{ env.AUTH0_CONTENT }}" > src/auth0.js;
          import: |
            echo -e "${{ env.IMPORT_STATEMENT }}"|cat - src/index.js > /tmp/out && mv /tmp/out src/index.js;

  vue:
    needs: test

    name: Vue Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Run framework tests
        uses: ./.github/actions/framework
        with:
          node: ${{ env.NODE_VERSION }}
          cache: ${{ env.CACHE_KEY }}
          install: |
            npx -p @vue/cli vue create my-app -d --packageManager npm  < /dev/null
          content: |
            echo -e "${{ env.AUTH0_CONTENT }}" > src/auth0.js;
          import: |
            echo -e "${{ env.IMPORT_STATEMENT }}"|cat - src/main.js > /tmp/out && mv /tmp/out src/main.js;

  angular:
    needs: test

    name: Angular Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Run framework tests
        uses: ./.github/actions/framework
        with:
          node: ${{ env.NODE_VERSION }}
          cache: ${{ env.CACHE_KEY }}
          install: |
            npx -p @angular/cli ng new my-app --defaults=true < /dev/null
          content: |
            echo -e "${{ env.AUTH0_CONTENT }}" > src/auth0.js;
          import: |
            echo -e "${{ env.IMPORT_STATEMENT }}"|cat - src/main.ts > /tmp/out && mv /tmp/out src/main.ts;
